version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: sumup_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  spark:
    image: jupyter/pyspark-notebook:latest
    container_name: sumup_spark_env
    depends_on:
      - mongodb
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes

volumes:
  mongo_data: